<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pinecrest — Sales Team Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F3FA;color:#1A2550;min-height:100vh}
.hdr{background:#2B3990;padding:20px 40px;display:flex;align-items:center}
.hdr-logo{font-size:18px;font-weight:800;color:#fff;letter-spacing:1.5px}
.hdr-sub{font-size:12px;color:#8FA3D8;margin-top:2px;letter-spacing:.3px}
.trend-wrap{background:#fff;border-bottom:2px solid #DDE4F0;padding:0 40px;overflow-x:auto;scrollbar-width:none}
.trend-wrap::-webkit-scrollbar{display:none}
.trend-inner{display:flex;align-items:stretch;min-width:max-content}
.trend-item{padding:14px 28px;text-align:center;border-right:1px solid #EEF1F9}
.trend-item:first-child{border-left:1px solid #EEF1F9}
.trend-wk{font-size:10px;font-weight:700;color:#8A9BBF;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.trend-pct{font-size:24px;font-weight:800;margin:3px 0;font-variant-numeric:tabular-nums}
.trend-pct.good{color:#1A8A4A}.trend-pct.mid{color:#E8932A}.trend-pct.bad{color:#D94040}
.trend-label{font-size:10px;color:#8A9BBF}
.trend-dials{font-size:11px;color:#7C4DCC;font-weight:700;margin-top:2px}
.main{max-width:1120px;margin:0 auto;padding:32px 40px}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8A9BBF;margin-bottom:16px}
.week-card{background:#fff;border:1px solid #DDE4F0;border-radius:10px;margin-bottom:16px;overflow:hidden;transition:box-shadow .15s}
.week-card:hover{box-shadow:0 2px 14px rgba(43,57,144,.09)}
.week-header{display:flex;align-items:stretch;cursor:pointer;user-select:none}
.week-label-col{padding:18px 24px;min-width:170px;border-right:1px solid #EEF1F9;display:flex;flex-direction:column;justify-content:center}
.week-label{font-size:14px;font-weight:700;color:#2B3990}
.week-dates{font-size:11px;color:#8A9BBF;margin-top:2px}
.week-stats{display:flex;flex:1;border-right:1px solid #EEF1F9}
.week-stat{flex:1;padding:18px 12px;border-right:1px solid #EEF1F9;text-align:center;display:flex;flex-direction:column;justify-content:center}
.week-stat:last-child{border-right:none}
.ws-num{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.ws-num.t{color:#2B3990}.ws-num.c{color:#1A8A4A}.ws-num.n{color:#D94040}.ws-num.r{color:#E8932A}.ws-num.d{color:#7C4DCC}
.ws-sub{font-size:10px;color:#8A9BBF;margin-top:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ws-pct{font-size:11px;margin-top:2px;font-weight:700}
.ws-pct.c{color:#1A8A4A}.ws-pct.n{color:#D94040}.ws-pct.d{color:#7C4DCC}
.week-toggle{padding:18px 20px;display:flex;align-items:center;color:#8A9BBF;font-size:12px;gap:5px;white-space:nowrap;flex-shrink:0}
.arrow{display:inline-block;transition:transform .2s;font-size:10px}
.week-card.open .arrow{transform:rotate(90deg)}
.week-body{display:none;border-top:1px solid #EEF1F9}
.week-card.open .week-body{display:block}
.tab-bar{display:flex;border-bottom:1px solid #EEF1F9;padding:0 24px;background:#FAFBFF}
.tab{padding:12px 20px;font-size:12px;font-weight:700;color:#8A9BBF;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:.3px;transition:color .15s}
.tab.active{color:#2B3990;border-bottom-color:#2B3990}
.tab-panel{display:none;padding:24px}
.tab-panel.active{display:block}
.sub-section{margin-bottom:24px}
.sub-section:last-child{margin-bottom:0}
.sub-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#8A9BBF;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #EEF1F9}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:#EEF1F9;text-align:left;padding:8px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#4A5E8A}
.tbl th.center,.tbl td.center{text-align:center}
.tbl td{padding:9px 10px;border-bottom:1px solid #EEF1F9;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.dim{color:#C8D4EC}
.badge{font-size:11px;font-weight:700}
.badge.h{color:#1A8A4A}.badge.n{color:#D94040}.badge.r{color:#E8932A}
.pip{font-size:11px;font-weight:700}
.pip.h{color:#1A8A4A}.pip.n{color:#D94040}.pip.r{color:#E8932A}
.day-cell{display:inline-flex;gap:3px;flex-wrap:wrap;justify-content:center}
.wk-sum{display:inline-flex;gap:4px;flex-wrap:wrap;justify-content:center}
.md-grid th{text-align:center}.md-grid th:first-child{text-align:left}
.md-grid td{text-align:center}.md-grid td:first-child{text-align:left;font-weight:600}
.drg{color:#1A8A4A;font-weight:700}.drm{color:#E8932A;font-weight:700}.drb{color:#D94040;font-weight:700}
.dial-total td{background:#EEF1F9;font-weight:700}
.no-data{color:#8A9BBF;font-style:italic;font-size:12px;padding:12px 0}
@media(max-width:800px){
  .hdr,.main{padding-left:16px;padding-right:16px}
  .trend-wrap{padding:0 16px}
  .week-label-col{min-width:120px;padding:12px 16px}
  .week-stats{flex-wrap:wrap}
  .week-stat{flex:0 0 50%;min-width:0}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">PINECREST GROUP</div>
    <div class="hdr-sub">SALES TEAM — WEEKLY TRACKER</div>
  </div>
</div>

<div class="trend-wrap">
  <div class="trend-inner" id="trendBar"></div>
</div>

<div class="main">
  <div class="section-label">All Weeks — click any row to expand</div>
  <div id="weekList"></div>
</div>

<script>
const WEEKS = [
  {
    id:'w0622', label:'Week 1', dates:'Jun 22 – 26, 2026',
    stats:{total:8,completed:4,noshow:4,rescheduled:1},
    pto:[
      {name:'Mallory Maxwell',level:'Business Consultant',days:'Thu (8h), Fri (8h)',hours:'16h'}
    ],
    mds:[
      {name:'Judah Azose', mon:[{t:'h'},{t:'n'}],tue:[{t:'r'}],wed:[],thu:[{t:'h'},{t:'h'},{t:'n'}],fri:[],week:{h:3,n:2,r:1}},
      {name:'Matt Levy',   mon:[],tue:[],wed:[],thu:[],fri:[],week:{h:0,n:0,r:0}},
      {name:'Ben Tabaria', mon:[],tue:[],wed:[],thu:[{t:'n'},{t:'n'}],fri:[{t:'h'}],week:{h:1,n:2,r:0}}
    ],
    outcomes:[
      {date:'Mon 22',md:'Judah Azose', sc:'David Shafron',  meeting:'Payroll Tax Savings — AMT Staffing',                   outcome:'n',notes:''},
      {date:'Mon 22',md:'Judah Azose', sc:'David Shafron',  meeting:'TRS Healthcare — Payroll Tax Savings',                 outcome:'h',notes:''},
      {date:'Tue 23',md:'Judah Azose', sc:'David Shafron',  meeting:'Payroll Tax Savings Program — FSB Livingston Bank',    outcome:'r',notes:''},
      {date:'Thu 25',md:'Judah Azose', sc:'David Shafron',  meeting:'Payroll Tax Savings Program — FSB Livingston Bank',    outcome:'h',notes:''},
      {date:'Thu 25',md:'Judah Azose', sc:'David Shafron',  meeting:'Payroll Tax Savings Plan — Parker Cromwell',           outcome:'n',notes:''},
      {date:'Thu 25',md:'Judah Azose', sc:'David Shafron',  meeting:'Payroll Tax Savings Program — Black Rock',             outcome:'h',notes:''},
      {date:'Thu 25',md:'Ben Tabaria', sc:'Hannah Bernays', meeting:'SPP — Tax Savings Discussion',                         outcome:'n',notes:''},
      {date:'Thu 25',md:'Ben Tabaria', sc:'Hannah Bernays', meeting:'White Peak Management — Group Health & Supplemental',  outcome:'n',notes:''},
      {date:'Fri 26',md:'Ben Tabaria', sc:'Ari Lowenstein', meeting:'SPP — Tax Strategy',                                   outcome:'h',notes:''}
    ],
    dialer:[
      {rep:'David Shafron',  role:'Sales Consultant', dials:null,connects:null,appts:null},
      {rep:'Hannah Bernays', role:'Sales Consultant', dials:null,connects:null,appts:null},
      {rep:'Ari Lowenstein', role:'Sales Consultant', dials:null,connects:null,appts:null}
    ]
  }
  // ADD NEW WEEKS HERE — copy the block above, update all fields, paste above this comment
];

const OL={h:'&#10003; Happened',n:'&#10007; No-Show',r:'&#8635; Rescheduled'};
const DAYS=['mon','tue','wed','thu','fri'];
const DL=['Mon','Tue','Wed','Thu','Fri'];

function pct(n,d){return(d&&n!=null)?Math.round(n/d*100)+'%':'&#8212;';}
function rc(n,d){if(!d||n==null)return'';const r=n/d;return r>=.5?'drg':r>=.3?'drm':'drb';}
function dc(p){
  if(!p||!p.length)return'<span class="dim">&#8212;</span>';
  return'<span class="day-cell">'+p.map(x=>`<span class="pip ${x.t}">${x.t==='h'?'&#10003;':x.t==='n'?'&#10007;':'&#8635;'}</span>`).join('')+'</span>';
}
function ws(w){
  const p=[];
  if(w.h)p.push(`<span class="pip h">&#10003;${w.h}</span>`);
  if(w.n)p.push(`<span class="pip n">&#10007;${w.n}</span>`);
  if(w.r)p.push(`<span class="pip r">&#8635;${w.r}</span>`);
  return p.length?`<span class="wk-sum">${p.join('')}</span>`:'<span class="dim">&#8212;</span>';
}

// Trend bar
const tb=document.getElementById('trendBar');
WEEKS.forEach(wk=>{
  const s=wk.stats,r=s.completed/s.total;
  const cls=r>=.6?'good':r>=.4?'mid':'bad';
  const td=wk.dialer.reduce((a,x)=>a+(x.dials||0),0);
  tb.innerHTML+=`<div class="trend-item">
    <div class="trend-wk">${wk.dates}</div>
    <div class="trend-pct ${cls}">${pct(s.completed,s.total)}</div>
    <div class="trend-label">show rate</div>
    ${td?`<div class="trend-dials">${td} dials</div>`:''}
  </div>`;
});

// Week cards
const wl=document.getElementById('weekList');
WEEKS.forEach(wk=>{
  const s=wk.stats;
  const td=wk.dialer.reduce((a,x)=>a+(x.dials||0),0);
  const tc=wk.dialer.reduce((a,x)=>a+(x.connects||0),0);
  const hd=td>0;

  const ptoHtml=wk.pto.length
    ?wk.pto.map(p=>`<tr><td>${p.name}</td><td>${p.level}</td><td>${p.days}</td><td>${p.hours}</td></tr>`).join('')
    :'<tr><td colspan="4" class="dim" style="font-style:italic">No PTO this week</td></tr>';

  const mdRows=wk.mds.map(m=>`<tr>
    <td>${m.name}</td>
    ${DAYS.map(d=>`<td class="center">${dc(m[d])}</td>`).join('')}
    <td class="center">${ws(m.week)}</td>
  </tr>`).join('');

  const outRows=wk.outcomes.map(o=>`<tr>
    <td>${o.date}</td><td>${o.md}</td><td>${o.sc}</td><td>${o.meeting}</td>
    <td><span class="badge ${o.outcome}">${OL[o.outcome]}</span></td>
    <td>${o.notes||''}</td>
  </tr>`).join('');

  let dr='',dtd=0,dtc=0,dta=0,any=false;
  wk.dialer.forEach(x=>{
    if(x.dials!=null)any=true;
    dtd+=x.dials||0;dtc+=x.connects||0;dta+=x.appts||0;
    dr+=`<tr>
      <td>${x.rep}</td><td>${x.role}</td>
      <td class="center">${x.dials??'&#8212;'}</td>
      <td class="center">${x.connects??'&#8212;'}</td>
      <td class="center ${rc(x.connects,x.dials)}">${pct(x.connects,x.dials)}</td>
      <td class="center">${x.appts??'&#8212;'}</td>
      <td class="center ${rc(x.appts,x.connects)}">${pct(x.appts,x.connects)}</td>
    </tr>`;
  });
  const dTot=any?`<tr class="dial-total">
    <td colspan="2">TEAM TOTAL</td>
    <td class="center">${dtd||'&#8212;'}</td><td class="center">${dtc||'&#8212;'}</td>
    <td class="center ${rc(dtc,dtd)}">${pct(dtc,dtd)}</td>
    <td class="center">${dta||'&#8212;'}</td>
    <td class="center ${rc(dta,dtc)}">${pct(dta,dtc)}</td>
  </tr>`:'';
  const dialContent=any
    ?`<table class="tbl"><thead><tr>
        <th>Rep</th><th>Role</th>
        <th class="center">Dials</th><th class="center">Connects</th><th class="center">Connect %</th>
        <th class="center">Appts Set</th><th class="center">Appt %</th>
      </tr></thead><tbody>${dr}${dTot}</tbody></table>`
    :'<div class="no-data">Dialer data not yet entered for this week.</div>';

  wl.innerHTML+=`<div class="week-card" id="${wk.id}">
    <div class="week-header" onclick="tog('${wk.id}')">
      <div class="week-label-col">
        <div class="week-label">${wk.label}</div>
        <div class="week-dates">${wk.dates}</div>
      </div>
      <div class="week-stats">
        <div class="week-stat"><div class="ws-num t">${s.total}</div><div class="ws-sub">Total</div></div>
        <div class="week-stat"><div class="ws-num c">${s.completed}</div><div class="ws-sub">Completed</div><div class="ws-pct c">${pct(s.completed,s.total)}</div></div>
        <div class="week-stat"><div class="ws-num n">${s.noshow}</div><div class="ws-sub">No-Shows</div><div class="ws-pct n">${pct(s.noshow,s.total)}</div></div>
        <div class="week-stat"><div class="ws-num r">${s.rescheduled}</div><div class="ws-sub">Rescheduled</div></div>
        ${hd?`<div class="week-stat"><div class="ws-num d">${td}</div><div class="ws-sub">Dials</div><div class="ws-pct d">${pct(tc,td)} conn.</div></div>`:''}
      </div>
      <div class="week-toggle"><span class="arrow">&#9658;</span> Details</div>
    </div>
    <div class="week-body">
      <div class="tab-bar">
        <div class="tab active" onclick="stab('${wk.id}','meetings',this)">Meetings</div>
        <div class="tab" onclick="stab('${wk.id}','dialer',this)">Dialer</div>
        <div class="tab" onclick="stab('${wk.id}','pto',this)">PTO</div>
      </div>
      <div id="${wk.id}-meetings" class="tab-panel active">
        <div class="sub-section">
          <div class="sub-label">Managing Director Breakdown</div>
          <table class="tbl md-grid">
            <thead><tr><th>Rep</th>${DL.map(d=>`<th class="center">${d}</th>`).join('')}<th class="center">Week Total</th></tr></thead>
            <tbody>${mdRows}</tbody>
          </table>
        </div>
        <div class="sub-section">
          <div class="sub-label">Tracked Outcomes</div>
          <table class="tbl">
            <thead><tr><th>Date</th><th>Managing Director</th><th>Sales Consultant</th><th>Meeting</th><th>Outcome</th><th>Notes</th></tr></thead>
            <tbody>${outRows}</tbody>
          </table>
        </div>
      </div>
      <div id="${wk.id}-dialer" class="tab-panel">
        <div class="sub-section">
          <div class="sub-label">Dialer Analytics</div>
          ${dialContent}
        </div>
      </div>
      <div id="${wk.id}-pto" class="tab-panel">
        <div class="sub-section">
          <div class="sub-label">PTO This Week</div>
          <table class="tbl">
            <thead><tr><th>Name</th><th>Level</th><th>Days Out</th><th>Total Hours</th></tr></thead>
            <tbody>${ptoHtml}</tbody>
          </table>
        </div>
      </div>
    </div>
  </div>`;
});

function tog(id){document.getElementById(id).classList.toggle('open');}
function stab(wid,tab,el){
  event.stopPropagation();
  const body=document.getElementById(wid).querySelector('.week-body');
  body.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  body.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(wid+'-'+tab).classList.add('active');
}
if(WEEKS.length)document.getElementById(WEEKS[0].id).classList.add('open');
</script>
</body>
</html>
