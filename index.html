function setStatus(id, status) {

}

}

// ── Meeting helpers ─────────────────────────────────────────────────────────
function allMeetings() {
  const out = [];
  for (const rep of REPS)
    for (const day of DAYS)
      for (const m of (MEETINGS[rep.key][day.key] || []))
        out.push({ ...m, repKey: rep.key, repName: rep.name, dayKey: day.key, dayLabel: day.label });
  return out;
}
function countableMeetings() { return allMeetings().filter(m => !getOutcome(m.id).excluded); }
// activeMeetings removes rescheduled from the denominator — completion/no-show rates are based on this
function activeMeetings() { return countableMeetings().filter(m => getOutcome(m.id).status !== 'rescheduled'); }
function dayMeetingCount(dayKey) {
  return REPS.reduce((n, r) => n + (MEETINGS[r.key][dayKey] || []).filter(m => {
    const o = getOutcome(m.id);
    return !o.excluded && o.status !== 'rescheduled';
  }).length, 0);
}
function totalMeetings() { return activeMeetings().length; }
function countStatus(s) { return countableMeetings().filter(m => getOutcome(m.id).status === s).length; }

// ── PTO helpers ─────────────────────────────────────────────────────────────
function ptoOutOnDay(dayKey) {
  return SALES_TEAM.filter(p => (PTO_DATA[p.name] || {})[dayKey] > 0);
}
function ptoHoursForPerson(name) {
  const d = PTO_DATA[name];
  if (!d) return 0;
  return Object.values(d).reduce((a, b) => a + b, 0);
}
function ptoOutCount() { return SALES_TEAM.filter(p => ptoHoursForPerson(p.name) > 0).length; }
function ptoTotalHours() { return Object.values(PTO_DATA).reduce((sum, d) => sum + Object.values(d).reduce((a,b)=>a+b,0), 0); }

// ── Card rendering ──────────────────────────────────────────────────────────
function cardClass(id) {
  const o = getOutcome(id);
  if (o.excluded) return ' excluded';
  return o.status ? ` s-${o.status}` : '';
}

function meetingCard(m) {
  const o = getOutcome(m.id);
  const s = o.status;
  const meetLink = m.meet ? `<span class="chip"><a href="${m.meet}" target="_blank">📹 Meet</a></span>` : '';
  return `
<div class="mc${cardClass(m.id)}" id="card-${m.id}">
  <div class="mc-top">
    <div class="mc-time">
      <div class="tstart">${m.ts}</div>
      <div class="tend">${m.te}</div>
      <div class="tdur">${m.dur}</div>
    </div>
    <div class="mc-sep"></div>
    <div class="mc-body">
      <div class="mc-title" title="${m.title}">${m.title}</div>
      <div class="mc-chips">
        <span class="chip">👤 ${m.contact}</span>
        <span class="chip">📋 ${m.org}</span>
        ${meetLink}
      </div>
    </div>
  </div>
  <div class="mc-foot">
    <span class="foot-label">Outcome:</span>
    <button class="sbtn${s==='happened'?' happened':''}" onclick="setStatus('${m.id}','happened')">✓ Happened</button>
    <button class="sbtn${s==='noshow'?' noshow':''}" onclick="setStatus('${m.id}','noshow')">✗ No-Show</button>
    <button class="sbtn${s==='rescheduled'?' rescheduled':''}" onclick="setStatus('${m.id}','rescheduled')">↻ Rescheduled</button>
    <button class="sbtn${o.excluded?' dnc':''}" onclick="toggleExclude('${m.id}')">${o.excluded?"⊘ Excluded":"⊘ Don't Count"}</button>
    <input class="notes-in" placeholder="Notes…" value="${(o.notes||'').replace(/"/g,'&quot;')}"
      onchange="setNotes('${m.id}',this.value)" oninput="setNotes('${m.id}',this.value)">
  </div>
</div>`;
}

function refreshCard(id) {
  const el = document.getElementById('card-' + id);
  if (!el) return;
  const o = getOutcome(id);
  const s = o.status;
  el.className = 'mc' + cardClass(id);
  el.querySelectorAll('.sbtn').forEach(b => {
    const t = b.textContent.trim();
    b.className = 'sbtn';
    if (s === 'happened'    && t.includes('Happened'))    b.classList.add('happened');
    if (s === 'noshow'      && t.includes('No-Show'))     b.classList.add('noshow');
    if (s === 'rescheduled' && t.includes('Rescheduled')) b.classList.add('rescheduled');
    if (t.includes('Count') || t.includes('Excluded')) {
      if (o.excluded) { b.classList.add('dnc'); b.textContent = '⊘ Excluded'; }
      else { b.textContent = "⊘ Don't Count"; }
    }
  });
}

function renderDay(dayKey) {
  const id = DAYS.find(d => d.key === dayKey).id;

  const dayObj = DAYS.find(d => d.key === dayKey);
  const outToday = ptoOutOnDay(dayKey);
  let html = `<div class="day-export-header">
    <span class="day-export-title">${dayObj.label} &mdash; ${dayObj.date}</span>

    <div style="display:flex;gap:8px;align-items:center">
      ${gcalIsConnected()?`<button class="btn-gcal-sync" onclick="gcalRefreshCurrentDay('${dayKey}')">↻ Sync</button>`:''}
      <button class="btn-export-day" onclick="exportDay('${dayKey}')">↓ Export Day</button>
    </div>
  </div>`;
  html += outToday.length
    ? `<div class="pto-day-banner">
        <span class="pto-day-label">Out Today</span>
        ${outToday.map(p => {
          const hrs = (PTO_DATA[p.name] || {})[dayKey];
          return `<span class="pto-day-chip">${p.name} <span class="pto-day-hrs">${hrs}h</span></span>`;
        }).join('')}
      </div>`
    : '';
  for (const rep of REPS) {
    const mtgs = MEETINGS[rep.key][dayKey] || [];
    html += `
<div class="rep-section">
  <div class="rep-header">
    <div class="rep-avatar ${rep.av}">${rep.initials}</div>
    <div>
      <span class="rep-name">${rep.name}</span>
      <span class="rep-count">— ${mtgs.length} meeting${mtgs.length!==1?'s':''}</span>
    </div>
  </div>
  ${mtgs.length ? mtgs.map(meetingCard).join('') : '<div class="empty-rep">No prospect meetings today.</div>'}
</div>`;
  }
  el.innerHTML = html;
}

function dayCellHTML(dayKey, repKey) {
  const all = MEETINGS[repKey][dayKey] || [];
  const mtgs = all.filter(m => !getOutcome(m.id).excluded);
  if (!mtgs.length) return `<span class="cb-none">—</span>`;
  const h = mtgs.filter(m => getOutcome(m.id).status === 'happened').length;
  const n = mtgs.filter(m => getOutcome(m.id).status === 'noshow').length;
  const r = mtgs.filter(m => getOutcome(m.id).status === 'rescheduled').length;
  const p = mtgs.filter(m => !getOutcome(m.id).status).length;
  let b = '';
  if (h) b += `<span class="cb cb-h">✓${h}</span>`;
  if (n) b += `<span class="cb cb-n">✗${n}</span>`;
  if (r) b += `<span class="cb cb-r">↻${r}</span>`;
  if (p) b += `<span class="cb cb-p">${p}p</span>`;
  return `<div class="cell-badges">${b}</div>`;
}

function showExportToast(msg) {
  let t = document.getElementById('export-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'export-toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A2550;color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;z-index:99999;max-width:480px;text-align:center;box-shadow:0 4px 16px rgba(0,0,.2,.3);display:none';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._to);
  t._to = setTimeout(() => { t.style.display = 'none'; }, 7000);
}

function showExportFallback() {
  const el = document.getElementById('exportContent');
  const old = el.querySelector('.efb');
  if (old) old.remove();
  const wrap = document.createElement('div');
  wrap.className = 'efb';
  wrap.style.cssText = 'margin-bottom:24px;padding:16px;background:#F4F7FC;border:1px solid #C8D4EC;border-radius:8px';
  const safe = _exportDoc.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  wrap.innerHTML = `<p style="font-size:12px;color:#4A5E8A;margin-bottom:8px;font-weight:600">Copy the HTML below → paste into Notepad → save as report.html → open in browser</p>
    <textarea readonly style="width:100%;height:160px;font-size:10px;font-family:monospace;border:1px solid #C8D4EC;border-radius:4px;padding:8px;resize:none" onclick="this.select()">${safe}</textarea>
    <button style="margin-top:8px;background:#2B3990;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer"
      onclick="const ta=this.previousElementSibling;ta.select();ta.setSelectionRange(0,99999);document.execCommand('copy');this.textContent='Copied!'">Select All &amp; Copy</button>`;
  el.insertBefore(wrap, el.firstChild);
}

function openInNewTab() {
  if (!_exportDoc) return;

  // 1. New tab
  try {
    const w = window.open('', '_blank');
    if (w) { w.document.write(_exportDoc); w.document.close(); return; }
  } catch(e) {}

  // 2. Blob download (element must be in DOM for click to fire)
  try {
    const blob = new Blob([_exportDoc], {type:'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'pinecrest-report.html';
    a.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
    document.body.appendChild(a);
    a.dispatchEvent(new MouseEvent('click', {bubbles:true, cancelable:true, view:window}));
    setTimeout(() => { if (a.parentNode) a.parentNode.removeChild(a); URL.revokeObjectURL(url); }, 1000);
    showExportToast('Report downloading…');
    return;
  } catch(e) {}

  // 3. Legacy clipboard (works in click handlers even in sandboxed iframes)
  try {
    const ta = document.createElement('textarea');
    ta.value = _exportDoc;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
    document.body.appendChild(ta);
    ta.focus(); ta.select(); ta.setSelectionRange(0, 99999);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok) { showExportToast('Report HTML copied to clipboard — paste into Notepad, save as report.html, then open in your browser.'); return; }
  } catch(e) {}

  // 4. Modern clipboard API
  if (navigator.clipboard) {
    navigator.clipboard.writeText(_exportDoc)
      .then(() => showExportToast('Report HTML copied — paste into Notepad, save as report.html, then open in your browser.'))
      .catch(() => showExportFallback());
    return;
  }

  showExportFallback();
}

const GCAL_CLIENT_ID = '303228217453-j6dric3ibsjhtpgecafclnrdcsgci66b.apps.googleusercontent.com';
const GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar.readonly';
const GCAL_MD_IDS = { judah: 'judah@pinecrestgroup.com', matt: 'matt@pinecrestgroup.com', ben: 'ben@pinecrestgroup.com' };
let _gcalTC = null;

function gcalGetToken() {
  const t = sessionStorage.getItem('pc_gcal_tok');
  const exp = Number(sessionStorage.getItem('pc_gcal_exp') || 0);
  return (t && Date.now() < exp) ? t : null;
}
function gcalSaveTok(r) {
  sessionStorage.setItem('pc_gcal_tok', r.access_token);
  sessionStorage.setItem('pc_gcal_exp', String(Date.now() + (r.expires_in - 60) * 1000));
}
function gcalIsConnected() { return !!gcalGetToken(); }
function gcalGetGustoId() { return localStorage.getItem('pc_gcal_gusto') || ''; }
function gcalTzISO(dayKey, time) {
  const off = new Date().getTimezoneOffset();
  const sign = off > 0 ? '-' : '+';
  const hh = String(Math.floor(Math.abs(off) / 60)).padStart(2, '0');
  const mm = String(Math.abs(off) % 60).padStart(2, '0');
  return dayKey + 'T' + time + sign + hh + ':' + mm;
}

function gcalConnect(onSuccess) {
  if (!window.google?.accounts?.oauth2) { setTimeout(() => gcalConnect(onSuccess), 300); return; }
  if (!_gcalTC) {
    _gcalTC = google.accounts.oauth2.initTokenClient({
      client_id: GCAL_CLIENT_ID,
      scope: GCAL_SCOPE,
      callback: (resp) => {
        if (resp.error) { alert('Google sign-in failed: ' + resp.error); return; }
        gcalSaveTok(resp);
        if (onSuccess) onSuccess();
      }
    });
  }
  if (gcalGetToken()) { if (onSuccess) onSuccess(); return; }
  _gcalTC.requestAccessToken();
}

async function gcalListCalendars() {
  const items = [];
  let pageToken = '';
  do {
    const url = 'https://www.googleapis.com/calendar/v3/users/me/calendarList?maxResults=250&showHidden=true&showDeleted=false' + (pageToken ? '&pageToken=' + pageToken : '');
    const r = await fetch(url, { headers: { Authorization: 'Bearer ' + gcalGetToken() } });
    const d = await r.json();
    (d.items || []).forEach(c => items.push(c));
    pageToken = d.nextPageToken || '';
  } while (pageToken);
  return items;
}

async function gcalAutoDetectGusto() {
  try {
    const cals = await gcalListCalendars();
    const gusto = cals.find(c => (c.summary || '').toLowerCase().includes('gusto'));
    if (gusto) { localStorage.setItem('pc_gcal_gusto', gusto.id); return true; }
  } catch(e) { console.error('gcalAutoDetectGusto', e); }
  return false;
}

async function gcalFetchEventsRaw(calId, isoMin, isoMax) {
  const p = new URLSearchParams({ timeMin: isoMin, timeMax: isoMax, singleEvents: 'true', orderBy: 'startTime', maxResults: '100' });
  const r = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events?${p}`, {
    headers: { Authorization: 'Bearer ' + gcalGetToken() }
  });
  return await r.json();
}

function gcalFmt(dt) {
  const h = dt.getHours(), m = dt.getMinutes(), ap = h < 12 ? 'AM' : 'PM';
  return (h % 12 || 12) + ':' + String(m).padStart(2, '0') + ' ' + ap;
}

function gcalEvtToMtg(ev, rep) {
  if (!ev.start?.dateTime || ev.status === 'cancelled') return null;
  if (!/\bspp\b|payroll[\s\-]?tax|\bwc\b/i.test(ev.summary || '')) return null;
  const s = new Date(ev.start.dateTime), e = new Date(ev.end.dateTime);
  const durMin = Math.round((e - s) / 60000);
  const dur = durMin >= 60 ? (durMin % 60 === 0 ? durMin/60 + ' hr' : (durMin/60).toFixed(1) + ' hr') : durMin + ' min';
  let meet = '';
  if (ev.conferenceData?.entryPoints) {
    const ve = ev.conferenceData.entryPoints.find(ep => ep.entryPointType === 'video');
    if (ve) meet = ve.uri;
  }
  if (!meet && ev.location && /^https?:|zoom\.|meet\.google/i.test(ev.location)) meet = ev.location;
  let contact = '';
  if (ev.attendees) {
    const ext = ev.attendees.find(a => !a.self && !a.organizer &&
      !/(pinecrestgroup|pinecrestconsulting|innovativebps)\.com/.test(a.email || ''));
    if (ext) contact = ext.email;
  }
  const dayKey = s.toISOString().slice(0, 10);
  return { id: 'gc-' + rep[0] + '-' + ev.id.replace(/[^a-z0-9]/gi,'').slice(-12), ts: gcalFmt(s), te: gcalFmt(e), dur, title: ev.summary || '(No title)', contact, org: '', meet, _dayKey: dayKey };
}

function gcalMatchPerson(title) {
  const t = title.toLowerCase();
  for (const p of SALES_TEAM) {
    const n = p.name.toLowerCase();
    const parts = n.split(' ');
    if (t.includes(n)) return p.name;
    if (parts.length >= 2 && t.includes(parts[0]) && t.includes(parts[parts.length - 1])) return p.name;
  }
  return null;
}

async function gcalFetchPTO(wk, gustoId, isoMin, isoMax) {
  try {
    const data = await gcalFetchEventsRaw(gustoId, isoMin, isoMax);
    const w = WEEK_STORE[wk];
    const newPto = {};
    for (const ev of (data.items || [])) {
      if (ev.status === 'cancelled' || !ev.start?.date) continue;
      const person = gcalMatchPerson(ev.summary || '');
      if (!person) continue;
      if (!newPto[person]) newPto[person] = {};
      const start = new Date(ev.start.date + 'T12:00:00');
      const end = new Date(ev.end.date + 'T12:00:00');
      for (let d = new Date(start); d < end; d.setDate(d.getDate() + 1)) {
        const dk = d.toISOString().slice(0, 10);
        if (w.days.some(wd => wd.key === dk)) newPto[person][dk] = 8;
      }
    }
    w.pto = newPto;
    PTO_DATA = w.pto;
  } catch(e) { console.error('gcalFetchPTO', e); }
}

async function gcalFetchWeek(wk) {
  if (!gcalGetToken()) return false;
  const w = WEEK_STORE[wk];
  const isoMin = gcalTzISO(w.days[0].key, '00:00:00');
  const isoMax = gcalTzISO(w.days[w.days.length - 1].key, '23:59:59');
  try {
    await Promise.all(['judah','matt','ben'].map(async rep => {
      const calId = GCAL_MD_IDS[rep];
      const data = await gcalFetchEventsRaw(calId, isoMin, isoMax);
      const evts = (data.items || []).map(ev => gcalEvtToMtg(ev, rep)).filter(Boolean);
      w.days.forEach(d => { w.meetings[rep][d.key] = []; });
      evts.forEach(ev => { if (w.meetings[rep][ev._dayKey] !== undefined) w.meetings[rep][ev._dayKey].push(ev); });
    }));
    const gustoId = gcalGetGustoId();
    if (gustoId) await gcalFetchPTO(wk, gustoId, isoMin, isoMax);
    return true;
  } catch(e) { console.error('gcalFetchWeek', e); return false; }
}

async function gcalRefreshCurrentDay(dayKey) {
  if (!gcalIsConnected()) { gcalConnect(() => gcalRefreshCurrentDay(dayKey)); return; }
  const w = WEEK_STORE[ACTIVE_WEEK];
  const isoMin = gcalTzISO(dayKey, '00:00:00');
  const isoMax = gcalTzISO(dayKey, '23:59:59');
  const btn = document.querySelector('.btn-gcal-sync');
  if (btn) { btn.textContent = '↻ Syncing…'; btn.disabled = true; }
  try {
    await Promise.all(['judah','matt','ben'].map(async rep => {
      const data = await gcalFetchEventsRaw(GCAL_MD_IDS[rep], isoMin, isoMax);
      w.meetings[rep][dayKey] = (data.items || []).map(ev => gcalEvtToMtg(ev, rep)).filter(ev => ev && ev._dayKey === dayKey);
    }));
    const gustoId = gcalGetGustoId();
    if (gustoId) await gcalFetchPTO(ACTIVE_WEEK, gustoId, isoMin, isoMax);
    MEETINGS = w.meetings;
    renderDay(dayKey);

    if (b) { b.textContent = '↻ Sync'; b.disabled = false; }
  }
}

  const hm = document.getElementById('headerMeta');

// Parse time strings like "1:23:45", "83:12", "45 min", or plain numbers → seconds
function dialParseTime(v){
  if(v==null||v==='')return null;
  const s=String(v).trim();
  const hms=s.match(/^(\d+):(\d{2}):(\d{2})$/);if(hms)return+hms[1]*3600+(+hms[2])*60+(+hms[3]);
  const ms=s.match(/^(\d+):(\d{2})$/);if(ms)return+ms[1]*60+(+ms[2]);
  const mn=s.match(/^([\d.]+)\s*min/i);if(mn)return Math.round(+mn[1]*60);
  const n=parseFloat(s);return isNaN(n)?null:n;
}
function dialFmtTime(secs){
  if(secs==null||secs===0)return'—';
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;
  if(h>0)return`${h}h ${m}m`;
  if(m>0)return`${m}m ${s}s`;
  return`${s}s`;
}
const ROLE_ORDER={'managing director':0,'senior business consultant':1,'business consultant':2};
function dialRoleSort(a,b){
  const ra=ROLE_ORDER[a.role.toLowerCase()]??9,rb=ROLE_ORDER[b.role.toLowerCase()]??9;
  if(ra!==rb)return ra-rb;
  return(b.combined||0)-(a.combined||0);
}

function dialGetEntry(name){
  const n=name.toLowerCase().trim();
  const esc=s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return DIAL_CANONICAL.find(e=>e.aliases.some(a=>{
    if(n===a)return true;
    return new RegExp('\\b'+esc(a)+'\\b').test(n)||new RegExp('\\b'+esc(n)+'\\b').test(a);
  }))||null;
}

function dialReadFile(file,p){
  const reader=new FileReader();
  reader.onload=function(e){
    const wb=XLSX.read(e.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];

    const headers=Object.keys(rows[0]);
    dialParsedMap[p]={rows,headers};

    grid.innerHTML='';
    DIAL_FIELDS.forEach(fd=>{

      grid.innerHTML+=`<div class="dial-map-item">

          <option value="">— skip —</option>

function dialPreview(p){
  if(!dialParsedMap[p])return;
  const g=k=>document.getElementById('dmap-'+p+'-'+k).value;
  const found=new Map();
  dialParsedMap[p].rows.forEach(r=>{
    const rep=(r[g('rep')]||'').toString().trim();
    if(!rep)return;
    const entry=dialGetEntry(rep);
    if(!entry)return;
    const dialtime=dialParseTime(r[g('dialtime')])||0;
    const talktime=dialParseTime(r[g('talktime')])||0;
    const combined=dialtime+talktime;
    const existing=found.get(entry.display);
    if(!existing||combined>(existing.combined||0)){
      found.set(entry.display,{rep:entry.display,role:entry.role,dialtime,talktime,combined});
    }
  });
  DIAL_CANONICAL.forEach(e=>{
    if(!found.has(e.display))found.set(e.display,{rep:e.display,role:e.role,dialtime:0,talktime:0,combined:0});
  });
  const mapped=[...found.values()].sort(dialRoleSort);
  dialParsedMap[p].mapped=mapped;
  localStorage.setItem(dialKey(p),JSON.stringify(mapped));
  document.getElementById('dial-result-table-'+p).innerHTML=buildDialHtml(mapped);
  document.getElementById('dialPublishBtn-'+p).disabled=false;
  document.getElementById('dialClearBtn-'+p).style.display='inline-block';
}

function buildDialHtml(rows){
  if(!rows||!rows.length)return'<div class="dial-no-data">No matching team members with activity found.</div>';
  let html='<table class="dial-tbl"><thead><tr><th>Team Member</th><th class="center">Dial Time</th><th class="center">Talk Time</th><th class="center">Combined Time</th></tr></thead><tbody>';
  let totDial=0,totTalk=0;
  DIAL_GROUPS.forEach(grp=>{
    const members=rows.filter(r=>r.role===grp.key).sort((a,b)=>(b.combined||0)-(a.combined||0));
    if(!members.length)return;
    html+=`<tr style="background:var(--surface-2)"><td colspan="4" style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-2);padding:8px 10px">${grp.label}</td></tr>`;
    members.forEach(r=>{
      totDial+=r.dialtime||0;totTalk+=r.talktime||0;
      html+=`<tr>
        <td><strong>${r.rep}</strong></td>
        <td class="center">${dialFmtTime(r.dialtime)}</td>
        <td class="center">${dialFmtTime(r.talktime)}</td>
        <td class="center"><strong>${dialFmtTime(r.combined)}</strong></td>
      </tr>`;
    });
  });
  html+=`<tr class="total-row"><td>TEAM TOTAL</td>
    <td class="center">${dialFmtTime(totDial)}</td>
    <td class="center">${dialFmtTime(totTalk)}</td>
    <td class="center"><strong>${dialFmtTime(totDial+totTalk)}</strong></td>
  </tr>`;
  return html+'</tbody></table>';
}

async function ghWriteJson(token,fileName,data){
  const api=`https://api.github.com/repos/${GH_REPO}/contents/${fileName}`;
  const headers={Authorization:'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
  let sha=null;
  const check=await fetch(api,{headers});
  if(check.ok){const f=await check.json();sha=f.sha;}
  else if(check.status!==404)throw new Error('Could not check file (token may be wrong)');
  const body={message:fileName+' update',content:btoa(unescape(encodeURIComponent(JSON.stringify(data))))};
  if(sha)body.sha=sha;
  const push=await fetch(api,{method:'PUT',headers,body:JSON.stringify(body)});
  if(!push.ok)throw new Error('Push failed — check token has repo write access');
}

  const token=localStorage.getItem('pc_gh_token');

  const sv=localStorage.getItem(dialKey(p));

    btn.disabled=false;
  }
}

  const g=k=>document.getElementById('lmap-'+k).value;
  const parseNum=v=>parseFloat(String(v==null?'':v).replace(/,/g,''))||0;
  const mapped=listParsed.rows.map(r=>({
    listname: r[g('listname')]||'',
    dials:    parseNum(r[g('dials')]),
    meetings: parseNum(r[g('meetings')]),
  })).filter(r=>r.listname).sort((a,b)=>b.dials-a.dials);
  listParsed.mapped=mapped;
  localStorage.setItem(listKey(),JSON.stringify(mapped));
  document.getElementById('list-result-table').innerHTML=buildListHtml(mapped);
  document.getElementById('listPublishBtn').disabled=false;
  document.getElementById('listClearBtn').style.display='inline-block';
}

function buildListHtml(rows){
  if(!rows||!rows.length)return'<div class="dial-no-data">No rows found — check column mapping above.</div>';
  let dr='',td=0,tm=0;
  rows.forEach(r=>{
    td+=r.dials;tm+=r.meetings;
    const rate=r.dials?Math.round(r.meetings/r.dials*100)+'%':'—';
    dr+=`<tr>
      <td><strong>${r.listname}</strong></td>
      <td class="center">${r.dials}</td>
      <td class="center">${r.meetings}</td>
      <td class="center">${rate}</td>
    </tr>`;
  });
  const totRate=td?Math.round(tm/td*100)+'%':'—';
  return`<table class="dial-tbl"><thead><tr>
    <th>List Name</th><th class="center">Dials</th><th class="center">Meetings</th><th class="center">Meeting Rate</th>
  </tr></thead><tbody>${dr}
    <tr class="total-row">
      <td>TOTAL</td>
      <td class="center">${td}</td>
      <td class="center">${tm}</td>
      <td class="center">${totRate}</td>
    </tr>
  </tbody></table>`;
}

function listClear(){
  listParsed=null;
  localStorage.removeItem(listKey());
  document.getElementById('listMapper').classList.remove('open');
  document.getElementById('list-result-table').innerHTML='<div class="dial-no-data">Drop your list Excel or CSV file below to get started.</div>';
  document.getElementById('listPublishBtn').disabled=true;
  document.getElementById('listClearBtn').style.display='none';
  document.getElementById('listPubStatus').className='dial-pub-status';
}

async function listPublish(){
  const token=localStorage.getItem('pc_gh_token');
  if(!token){alert('Save your GitHub token first.');return;}
  const sv=localStorage.getItem(listKey());
  if(!sv){alert('No data to publish.');return;}
  const btn=document.getElementById('listPublishBtn');
  const status=document.getElementById('listPubStatus');
  btn.disabled=true;status.textContent='Publishing…';status.className='dial-pub-status loading';
  try{
    await ghWriteJson(token,listJsonFile(),JSON.parse(sv));
    status.textContent='✓ Published! Team sees it in ~60 seconds.';status.className='dial-pub-status ok';
  }catch(err){
    status.textContent='Error: '+err.message;status.className='dial-pub-status err';
    btn.disabled=false;
  }
}

// ── Call Analyzer ────────────────────────────────────────────────────────────
const CA_DISPOSITIONS = [
  { key:'meeting_booked', label:'Working in Monday',
    def:'Real meeting scheduled or handoff created.',
    reasons:['Meeting scheduled','Other - type note'] },
  { key:'tier1', label:'Tier 1',
    def:'Closest-to-money non-meeting call: real progress, decision-maker engaged, proposal/review, or clear commercial next step.',
    reasons:['Decision-maker engaged','Great Call','Other - type note'] },
  { key:'positive_blocker', label:'Positive Call - Blocker',
    def:'Engaged/useful call where the blocker is exactly why it is valuable to call again.',
    reasons:["Broker / CPA uncomfortable","Current carrier / current solution","Compliance / program skepticism","Doesn't Understand / Employees Don't Want","Other - type note"] },
  { key:'follow_up', label:'Follow Up',
    def:'Receptive or actionable call-again, but shallow/no real progress and no substantive blocker.',
    reasons:['Requested information','Asked to call later / bad time','Specific callback date','Other - type note'] },
  { key:'no_connect', label:'No Connect',
    def:'No real business context: hung up during pitch, transfer then no answer, bad connection.',
    reasons:['Hung up during pitch','No answer after transfer','Bad connection / dead air','Other - type note'] },
  { key:'disqualified', label:'Disqualified / DNC',
    def:'Disqualified, no eligible fit, or explicit removal/do-not-call request.',
    reasons:['Explicit DNC / remove request','Too small / no employees','No eligible W2 population','Other - type note'] },
  { key:'data_correction', label:'Data Correction Needed',
    def:'Record is not ready for normal calling because data is wrong/incomplete.',
    reasons:['Wrong contact / need decision-maker','Contact no longer at company','Wrong company / corporate owns benefits','Need replacement phone','Other - type note'] },
];
const CA_DISPO_MODEL = CA_DISPOSITIONS.map(d =>
  `${d.label}: ${d.def}\n  Reasons: ${d.reasons.join(', ')}`
).join('\n\n');

function renderCallAnalyzer() {
  const saved = localStorage.getItem('pc_claude_key');
  const dispoOpts = CA_DISPOSITIONS.map(d =>
    `<option value="${d.key}">${d.label}</option>`).join('');
  document.getElementById('call-analyzer-view').innerHTML = `
    <div style="margin-bottom:18px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);padding-bottom:10px;border-bottom:1px solid var(--border)">Call Analyzer — Disposition QA</div>
    <div class="ca-key-bar" style="margin-bottom:18px;max-width:860px">
      <label>Anthropic API Key</label>
      <input type="password" id="caKeyInput" placeholder="sk-ant-… (saved locally)">
      <button class="btn-save-token" onclick="caSaveKey()">Save</button>
      <span id="caKeyStatus" class="${saved?'token-ok':'token-no'}">${saved?'✓ Key saved':'No key — save one to analyze calls'}</span>
    </div>
    <div class="ca-wrap">
      <div class="ca-panel">
        <div class="ca-panel-title">Call Details</div>
        <div class="ca-field">
          <label>Rep Name (optional)</label>
          <input type="text" id="caRep" placeholder="e.g. Jack Shimonov">
        </div>
        <div class="ca-field">
          <label>Disposition Rep Selected</label>
          <select id="caDispo" onchange="caUpdateReasons()">
            <option value="">— Select disposition —</option>${dispoOpts}
          </select>
        </div>
        <div class="ca-field">
          <label>Reason Rep Selected</label>
          <select id="caReason">
            <option value="">— Select reason —</option>
          </select>
        </div>
        <div class="ca-field">
          <label>Call Transcript</label>
          <textarea id="caTranscript" placeholder="Paste the full call transcript here…"></textarea>
        </div>
        <button class="ca-analyze-btn" id="caBtn" onclick="caAnalyze()">Analyze Call</button>
      </div>
      <div class="ca-result" id="caResult">
        <div class="ca-result-empty">Paste a transcript and select the disposition the rep logged.<br>The AI will verify whether it was correct.</div>
      </div>
    </div>`;
}

function caSaveKey() {
  const k = document.getElementById('caKeyInput').value.trim();
  if (!k) { alert('Paste your Anthropic API key first.'); return; }
  localStorage.setItem('pc_claude_key', k);
  document.getElementById('caKeyInput').value = '';
  document.getElementById('caKeyStatus').textContent = '✓ Key saved';
  document.getElementById('caKeyStatus').className = 'token-ok';
}

function caUpdateReasons() {
  const d = CA_DISPOSITIONS.find(x => x.key === document.getElementById('caDispo').value);
  const sel = document.getElementById('caReason');
  sel.innerHTML = '<option value="">— Select reason —</option>';
  if (d) d.reasons.forEach(r => {
    const o = document.createElement('option'); o.value = r; o.textContent = r; sel.appendChild(o);
  });
}

async function caAnalyze() {
  const key = localStorage.getItem('pc_claude_key');
  if (!key) { alert('Save your Anthropic API key first.'); return; }
  const tx = document.getElementById('caTranscript').value.trim();
  if (!tx) { alert('Paste a call transcript first.'); return; }
  const dk = document.getElementById('caDispo').value;
  const dispo = CA_DISPOSITIONS.find(d => d.key === dk);
  if (!dispo) { alert('Select the disposition the rep logged.'); return; }
  const reason = document.getElementById('caReason').value || '(none selected)';
  const rep = document.getElementById('caRep').value.trim() || 'The rep';
  const result = document.getElementById('caResult');
  const btn = document.getElementById('caBtn');
  result.innerHTML = '<div class="ca-loading"><div class="ca-spinner"></div>Analyzing…</div>';
  btn.disabled = true;
  const prompt = `You are a call quality analyst for Pinecrest Group, a professional services firm selling Section 125 / Supplemental Prevention Plans (SPP) to Amazon Delivery Service Partners (DSPs).

You have been given a sales call transcript and the disposition + reason the rep logged. Verify whether the correct disposition was used.

DISPOSITION MODEL:
${CA_DISPO_MODEL}

TRANSCRIPT:
${tx}

REP LOGGED:
Disposition: ${dispo.label}
Reason: ${reason}

Determine the correct disposition, correct reason, verdict (correct/partially_correct/incorrect), 2-3 direct quotes from the transcript supporting your verdict, and a short coaching note if wrong (empty string if correct).

Respond ONLY with valid JSON:
{"verdict":"correct"|"partially_correct"|"incorrect","correct_disposition":"exact label","correct_reason":"exact reason","explanation":"1-2 sentences","evidence":["q1","q2","q3"],"coaching_note":"text or empty string"}`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'x-api-key':key,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-allow-browser':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1024,messages:[{role:'user',content:prompt}]})
    });
    if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||'API error '+res.status); }
    const data = await res.json();
    const json = JSON.parse(data.content[0].text.match(/\{[\s\S]*\}/)[0]);
    caRenderResult(json, dispo.label, reason, rep);
  } catch(e) {
    result.innerHTML = `<div style="color:#B91C1C;font-size:13px;padding:20px 0">Error: ${e.message}</div>`;
  } finally { btn.disabled = false; }
}

function caRenderResult(r, selDispo, selReason, rep) {
  const vClass = r.verdict==='correct'?'correct':r.verdict==='partially_correct'?'partial':'incorrect';
  const vLabel = r.verdict==='correct'?'✓ Correct Disposition':r.verdict==='partially_correct'?'⚠ Partially Correct':'✗ Incorrect Disposition';
  const changed = r.correct_disposition !== selDispo;
  const dispoHtml = `<div>
    <div class="ca-sec-label">Disposition Review</div>
    <div class="ca-dispo-row">
      <div class="ca-dispo-box${changed?' wrong':''}">
        <div class="ca-dispo-eyebrow">${rep} logged</div>
        <div class="ca-dispo-name">${selDispo}</div>
        <div class="ca-dispo-reason">${selReason}</div>
      </div>
      ${changed?`<div class="ca-dispo-arrow">→</div><div class="ca-dispo-box right"><div class="ca-dispo-eyebrow">Should be</div><div class="ca-dispo-name">${r.correct_disposition}</div><div class="ca-dispo-reason">${r.correct_reason}</div></div>`:''}
    </div></div>`;
  const evidHtml = r.evidence&&r.evidence.length?`<div><div class="ca-sec-label">Evidence from Call</div><div class="ca-evidence">${r.evidence.map(q=>`<div class="ca-quote">"${q}"</div>`).join('')}</div></div>`:'';
  const coachHtml = r.coaching_note?`<div><div class="ca-sec-label">Coaching Note</div><div class="ca-coaching">${r.coaching_note}</div><button class="ca-copy-btn" onclick="navigator.clipboard.writeText(${JSON.stringify(r.coaching_note)}).then(()=>{this.textContent='✓ Copied';setTimeout(()=>this.textContent='Copy Note',1500)})">Copy Note</button></div>`:'';
  document.getElementById('caResult').innerHTML = `
    <div class="ca-verdict ${vClass}">${vLabel}</div>
    <div style="font-size:13px;color:var(--text-2);line-height:1.7">${r.explanation}</div>
    ${dispoHtml}${evidHtml}${coachHtml}`;
}

showHome();
</script>
