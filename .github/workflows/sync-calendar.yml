name: Daily calendar sync

# Reads the 3 MD calendars + the Gusto PTO calendar and publishes per-week
# meetings JSON to the repo, so the hub shows current meetings/PTO without
# anyone having to sign in a browser.
#
# ACTIVE — runs daily at 12:00 UTC. Auth via the OAuth secrets
# GOOGLE_OAUTH_CLIENT_ID / _SECRET / _REFRESH_TOKEN (see CALENDAR-SYNC-SETUP.md).
# Can also be run on demand from the Actions tab (workflow_dispatch).

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC daily (~5-7am Pacific)

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm install googleapis
      - name: Sync calendars → per-week meetings JSON
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: node scripts/sync-calendar.mjs
      - name: Commit any changes
        run: |
          git config user.name  "pinecrest-calendar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add meetings-*.json
          if git diff --cached --quiet; then
            echo "No calendar changes today."
          else
            git commit -m "chore: daily calendar sync $(date -u +%Y-%m-%d)"
            git push
          fi
