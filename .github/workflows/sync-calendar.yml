name: Daily calendar sync

# Reads the 3 MD calendars + the Gusto PTO calendar and publishes per-week
# meetings JSON to the repo, so the hub shows current meetings/PTO without
# anyone having to sign in a browser.
#
# INACTIVE until IT provisions access (see CALENDAR-SYNC-SETUP.md):
#   - a Google service account with Calendar read access to the 4 calendars
#   - its JSON key stored as the repo secret GOOGLE_SA_KEY
# The daily schedule below is intentionally commented out until that exists;
# run it by hand from the Actions tab (workflow_dispatch) to test first.

on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: '0 12 * * *'   # 12:00 UTC daily (~5-7am Pacific) — enable after GOOGLE_SA_KEY is set

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm install googleapis
      - name: Sync calendars → per-week meetings JSON
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: node scripts/sync-calendar.mjs
      - name: Commit any changes
        run: |
          git config user.name  "pinecrest-calendar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add meetings-*.json
          if git diff --cached --quiet; then
            echo "No calendar changes today."
          else
            git commit -m "chore: daily calendar sync $(date -u +%Y-%m-%d)"
            git push
          fi
